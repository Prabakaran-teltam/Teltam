{% extends 'payments/base.html' %}

{% block content %}
<div class="status-icon error">✕</div>
<div class="logo">
    <h1>Payment Failed</h1>
</div>
<div class="card">
    <p style="text-align: center; color: #ff4b5c;">Your transaction could not be completed at this time.</p>
    <div style="display: flex; justify-content: space-between;">
        <span style="color: #aaa;">Order ID:</span>
        <span>{{ transaction.order_id }}</span>
    </div>
</div>
<a href="{% url 'home' %}" class="btn" style="background: rgba(255,255,255,0.1);">Try Again</a>
{% endblock %}
