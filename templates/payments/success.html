{% extends 'payments/base.html' %}

{% block content %}
<div class="status-icon success">✓</div>
<div class="logo">
    <h1>Payment Successful</h1>
</div>
<div class="card">
    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
        <span style="color: #aaa;">Order ID:</span>
        <span>{{ transaction.order_id }}</span>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
        <span style="color: #aaa;">Transaction ID:</span>
        <span>{{ transaction.transaction_id }}</span>
    </div>
    {% if transaction.note %}
    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
        <span style="color: #aaa;">Note:</span>
        <span>{{ transaction.note }}</span>
    </div>
    {% endif %}
    <div style="display: flex; justify-content: space-between;">
        <span style="color: #aaa;">Amount Paid:</span>
        <span style="font-weight: 600;">₹{{ transaction.amount }}</span>
    </div>
</div>
<a href="{% url 'home' %}" class="btn">Back to Home</a>
{% endblock %}
