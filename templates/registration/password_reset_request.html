{% load widget_tweaks %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Teltam</title>
  <link href="{% static 'assets/img/fav_icon.png' %}" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link href="{% static "assets/vendor/bootstrap/css/bootstrap.min.css" %}" rel="stylesheet">
  <link href="{% static "assets/vendor/bootstrap-icons/bootstrap-icons.css" %}" rel="stylesheet">
  <link href="{% static "assets/vendor/aos/aos.css" %}" rel="stylesheet">
  <link href="{% static "assets/vendor/glightbox/css/glightbox.min.css" %}" rel="stylesheet">
  <link href="{% static "assets/vendor/swiper/swiper-bundle.min.css" %}" rel="stylesheet">
  <link href="{% static "assets/css/main.css" %}" rel="stylesheet">

</head>

<body class="index-page light-background">
  <main class="main">
	<section id="register" class="register section">
		<div class="container" data-aos="fade-up" data-aos-delay="100">
			<div class="row g-4 g-lg-5">
				<div class="col-lg-6">
					<img src="{% static "assets/img/forget.png" %}" alt="Hero Image" class="img-fluid">
				</div>
				<div class="col-lg-5">
				<div class="contact-form" data-aos="fade-up" data-aos-delay="300">
					<div class="container section-title" data-aos="fade-up">
						<br><br>
						<h2>Forgot password</h2>
						<p>Enter your email, and we’ll send you a password recovery link.</p>
					</div>
					<form method="post">
						{% csrf_token %}
						{% render_field form.email class="form-control" placeholder="Enter your email ID" %}
						<br>
						<div class="col-12 text-center">
						<button class="btn btn-primary" type="submit">Send Reset Link</button>
						<br>
						<br>
						<a href="{% url "login" %}"><i class="bi bi-box-arrow-in-left"></i>&nbsp;Back to login</a>
						</div>
					</form>
				</div>
				</div>
			</div>
		</div>
		<br><br>
  	</section>
</main>
{% include "message.html" %}
<a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
<script src="{% static "assets/vendor/bootstrap/js/bootstrap.bundle.min.js" %}"></script>
<script src="{% static "assets/vendor/php-email-form/validate.js" %}"></script>
<script src="{% static "assets/vendor/aos/aos.js" %}"></script>
<script src="{% static "assets/vendor/glightbox/js/glightbox.min.js" %}"></script>
<script src="{% static "assets/vendor/swiper/swiper-bundle.min.js" %}"></script>
<script src="{% static "assets/vendor/purecounter/purecounter_vanilla.js" %}"></script>
<script src="{% static "assets/js/main.js" %}"></script>
</body>
</html>
